name: Daily Tariff Monitor

on:
  schedule:
    - cron: '30 19 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 pdfplumber anthropic openpyxl apscheduler
      - name: Run tariff pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tariff_pipeline.py --run-all
      - name: Commit and push if changed
        run: |
          git config user.name "tariff-bot"
          git config user.email "tariff-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto update: $(date +'%Y-%m-%d')"
          git push
